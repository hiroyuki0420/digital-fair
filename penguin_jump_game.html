<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペンギンジャンプ（スマホ版）</title>
<style>
body { text-align:center; font-family:sans-serif; margin:0; background:skyblue; }
h2 { margin:5px; }
canvas { width:100%; max-width:400px; height:auto; border:2px solid black; }
button { padding:15px; font-size:18px; margin:10px; }
</style>
</head>
<body>
<h2>🐧 ジャンプゲーム</h2>
<p>タップでジャンプ！</p>
<button onclick="startGame()">スタート</button><br>
<canvas id="game" width="400" height="300"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let player,obstacles,frame,score,gameOver;
function reset(){player={x:60,y:220,vy:0,onGround:true};obstacles=[];frame=0;score=0;gameOver=false;}
function startGame(){reset();update();}
function jump(){if(!gameOver&&player.onGround){player.vy=-12;player.onGround=false;}}
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();});
canvas.addEventListener('click',jump);
function update(){if(gameOver)return;
frame++;ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#ddd';ctx.fillRect(0,230,400,5);
player.vy+=0.6;player.y+=player.vy;
if(player.y>=220){player.y=220;player.vy=0;player.onGround=true;}
ctx.font='30px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🐧',player.x,player.y);
if(obstacles.length===0&&frame%80===0){obstacles.push({x:400,y:220,w:25,h:35,speed:2+Math.random()*3});}
for(let i=obstacles.length-1;i>=0;i--){let o=obstacles[i];o.x-=o.speed;
ctx.fillStyle='red';ctx.fillRect(o.x,o.y-o.h,o.w,o.h);
if(player.x+10>o.x&&player.x-10<o.x+o.w&&player.y+10>o.y-o.h){gameOver=true;
ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,400,300);
ctx.fillStyle='white';ctx.font='20px Arial';
ctx.fillText('ゲームオーバー',200,130);
ctx.fillText('Score: '+score,200,160);
return;}
if(o.x<-30){obstacles.splice(i,1);score++;}}
ctx.fillStyle='black';ctx.font='16px Arial';ctx.textAlign='left';ctx.fillText('Score: '+score,10,20);
requestAnimationFrame(update);}
</script>
</body>
</html>
