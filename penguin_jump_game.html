<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ペンギンジャンプ</title>
<style>
body { text-align:center; font-family:sans-serif; }
canvas { border:2px solid black; background:skyblue; }
button { padding:10px 20px; font-size:16px; margin-bottom:10px; }
</style>
</head>
<body>
<h1>ペンギンジャンプゲーム 🐧</h1>
<p>クリックでジャンプ！障害物をよけよう</p>
<button onclick="startGame()">スタート</button><br>
<canvas id="game" width="400" height="300"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let player,obstacles,frame,score,gameOver;
function reset(){player={x:60,y:220,vy:0,onGround:true,size:20};obstacles=[];frame=0;score=0;gameOver=false;}
function startGame(){reset();update();}
function jump(){if(!gameOver && player.onGround){player.vy=-12;player.onGround=false;}}
function update(){if(gameOver)return;
frame++;ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#ddd';ctx.fillRect(0,230,400,5);
player.vy+=0.6;player.y+=player.vy;
if(player.y>=220){player.y=220;player.vy=0;player.onGround=true;}
ctx.font='30px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('🐧',player.x,player.y);
if(obstacles.length===0 && frame%80===0){const speed=2+Math.random()*3;obstacles.push({x:400,y:220,w:25,h:35,speed});}
for(let i=obstacles.length-1;i>=0;i--){const obs=obstacles[i];obs.x-=obs.speed;
ctx.fillStyle='red';ctx.fillRect(obs.x,obs.y-obs.h,obs.w,obs.h);
if(player.x+10>obs.x && player.x-10<obs.x+obs.w && player.y+10>obs.y-obs.h){gameOver=true;
ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,400,300);
ctx.fillStyle='white';ctx.font='24px Arial';
ctx.fillText('ゲームオーバー',200,130);
ctx.fillText('Score: '+score,200,170);return;}
if(obs.x<-30){obstacles.splice(i,1);score++;}}
ctx.fillStyle='black';ctx.font='16px Arial';ctx.textAlign='left';
ctx.fillText('Score: '+score,10,20);
requestAnimationFrame(update);}
window.addEventListener('click',jump);
</script>
</body>
</html>
