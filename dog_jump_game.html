<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いぬジャンプ（スマホ版）</title>

<style>
body { text-align:center; margin:0; background:skyblue; }
canvas { width:100%; max-width:400px; border:2px solid black; background:#eef; }
button { padding:15px; margin:10px; }
</style>

</head>
<body>

<h2>🐶 いぬジャンプ</h2>
<p>タップでジャンプ！</p>

<button onclick="startGame()">スタート</button><br>
<canvas id="c" width="400" height="400"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let p,o=[],vy=0,g=0.6,s=0,over=false;

function startGame(){
 p={x:200,y:350};
 o=[]; vy=0; s=0; over=false;
 loop();
}

function jump(){ if(!over) vy=-10; }

c.addEventListener("touchstart",e=>{e.preventDefault();jump();});
c.addEventListener("click",jump);

function loop(){
 if(over)return;

 ctx.clearRect(0,0,400,400);

 vy+=g;
 p.y+=vy;

 if(p.y>380){
  over=true;
  ctx.fillText("GAME OVER",150,200);
  return;
 }

 ctx.font="30px Arial";
 ctx.fillText("🐶",p.x,p.y);

 if(Math.random()<0.02){
  let left=Math.random()<0.5;
  o.push({
   x:left?-30:400,
   y:Math.random()*300,
   s:(Math.random()*2+2)*(left?1:-1)
  });
 }

 for(let i=o.length-1;i>=0;i--){
  let ob=o[i];
  ob.x+=ob.s;

  ctx.fillStyle="red";
  ctx.fillRect(ob.x,ob.y,20,20);

  if(Math.abs(ob.x-p.x)<20 && Math.abs(ob.y-p.y)<20){
   over=true;
   ctx.fillText("GAME OVER",150,200);
   return;
  }

  if(ob.x<-40||ob.x>440){
   o.splice(i,1);
   s++;
  }
 }

 ctx.fillStyle="black";
 ctx.fillText("Score:"+s,10,20);

 requestAnimationFrame(loop);
}
</script>

</body>
</html>
