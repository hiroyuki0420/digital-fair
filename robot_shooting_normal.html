<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロボットシューティング（ふつう）</title>
<style>
body { text-align:center; background:#111; color:white; font-family:sans-serif; margin:0; }
canvas { width:100%; max-width:400px; border:2px solid white; }
button { padding:15px; margin:10px; font-size:18px; }
</style>
</head>
<body>
<h2>🤖 ロボットシューティング</h2>
<p>ふつうモード：タップで攻撃 / 指で移動</p>

<button onclick="startGame()">スタート</button><br>
<canvas id="game" width="400" height="300"></canvas>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

let player, bullets, enemies, frame, score, gameOver;

function reset(){
 player={x:50,y:150};
 bullets=[];
 enemies=[];
 frame=0;
 score=0;
 gameOver=false;
}

function startGame(){reset();loop();}

function shoot(){if(!gameOver) bullets.push({x:player.x+20,y:player.y});}

canvas.addEventListener('touchmove',e=>{
 e.preventDefault();
 const r=canvas.getBoundingClientRect();
 player.y=e.touches[0].clientY-r.top;
});

canvas.addEventListener('mousemove',e=>{
 const r=canvas.getBoundingClientRect();
 player.y=e.clientY-r.top;
});

canvas.addEventListener('touchstart',e=>{e.preventDefault(); shoot();});
canvas.addEventListener('click',shoot);

function loop(){
 if(gameOver) return;

 frame++;
 ctx.clearRect(0,0,400,300);

 // プレイヤー
 ctx.font='30px Arial';
 ctx.textAlign='center';
 ctx.textBaseline='middle';
 ctx.fillText('🤖',player.x,player.y);

 // 弾
 for(let i=bullets.length-1;i>=0;i--){
  bullets[i].x+=5;
  ctx.fillStyle='cyan';
  ctx.fillRect(bullets[i].x,bullets[i].y-2,10,4);
  if(bullets[i].x>400) bullets.splice(i,1);
 }

 // 敵生成（ふつうなので適度な頻度）
 if(frame%70===0){
  enemies.push({
   x:400,
   y:Math.random()*260+20,
   speed:2+Math.random()*2
  });
 }

 // 敵処理
 for(let i=enemies.length-1;i>=0;i--){
  let e=enemies[i];
  e.x-=e.speed;

  ctx.fillText('👾',e.x,e.y);

  // 衝突
  if(Math.abs(e.x-player.x)<20 && Math.abs(e.y-player.y)<20){
   gameOver=true;

   ctx.fillStyle='rgba(0,0,0,0.7)';
   ctx.fillRect(0,0,400,300);
   ctx.fillStyle='white';
   ctx.font='24px Arial';
   ctx.fillText('ゲームオーバー',200,130);
   ctx.fillText('Score: '+score,200,170);
   return;
  }

  // 弾ヒット
  for(let j=bullets.length-1;j>=0;j--){
   let b=bullets[j];
   if(Math.abs(b.x-e.x)<15 && Math.abs(b.y-e.y)<15){
    enemies.splice(i,1);
    bullets.splice(j,1);
    score++;
    break;
   }
  }

  if(e.x<-30) enemies.splice(i,1);
 }

 // スコア
 ctx.fillStyle='white';
 ctx.font='16px Arial';
 ctx.textAlign='left';
 ctx.fillText('Score: '+score,10,20);

 requestAnimationFrame(loop);
}
</script>

</body>
</html>
