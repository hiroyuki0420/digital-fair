<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シューティング</title>
<style>
body { text-align:center; background:#000021; color:white; margin:0; }
canvas { width:100%; max-width:400px; border:2px solid white; }
button { padding:15px; margin:10px; }
</style>
</head>
<body>

<h2>🐧 シューティング</h2>
<p>タップで撃つ / 指で移動</p>

<button onclick="startGame()">スタート</button><br>
<canvas id="c" width="400" height="300"></canvas>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let p,b=[],e=[],f,s,g;

function reset(){
 p={x:50,y:150}; b=[]; e=[]; f=0; s=0; g=false;
}
function startGame(){reset();loop();}

function shoot(){if(!g)b.push({x:p.x+20,y:p.y});}

canvas.addEventListener("touchmove",ev=>{
 ev.preventDefault();
 const r=canvas.getBoundingClientRect();
 p.y=ev.touches[0].clientY-r.top;
});

canvas.addEventListener("touchstart",ev=>{
 ev.preventDefault(); shoot();
});

canvas.addEventListener("mousemove",ev=>{
 const r=canvas.getBoundingClientRect();
 p.y=ev.clientY-r.top;
});

canvas.addEventListener("click",shoot);

function loop(){
 if(g)return;
 f++;
 ctx.clearRect(0,0,400,300);

 ctx.font="30px Arial";
 ctx.fillText("🐧",p.x,p.y);

 for(let i=b.length-1;i>=0;i--){
  b[i].x+=6;
  ctx.fillStyle="yellow";
  ctx.fillRect(b[i].x,b[i].y,8,3);
  if(b[i].x>400)b.splice(i,1);
 }

 if(f%60===0){
  e.push({x:400,y:Math.random()*260,s:2+Math.random()*2});
 }

 for(let i=e.length-1;i>=0;i--){
  let o=e[i]; o.x-=o.s;
  ctx.fillText("👾",o.x,o.y);

  if(Math.abs(o.x-p.x)<20 && Math.abs(o.y-p.y)<20){
   g=true;
   ctx.fillText("GAME OVER",150,150);
   return;
  }

  for(let j=b.length-1;j>=0;j--){
   let bb=b[j];
   if(Math.abs(bb.x-o.x)<15 && Math.abs(bb.y-o.y)<15){
    e.splice(i,1); b.splice(j,1); s++; break;
   }
  }

  if(o.x<-30)e.splice(i,1);
 }

 ctx.fillStyle="white";
 ctx.fillText("Score:"+s,10,20);

 requestAnimationFrame(loop);
}
</script>

</body>
</html>
