<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ペンギンシューティング（移動版）</title>
<style>
body { text-align:center; font-family:sans-serif; background:#000022; color:white; }
canvas { border:2px solid white; background:#000022; }
button { padding:10px 20px; margin-bottom:10px; }
</style>
</head>
<body>
<h1>ペンギンシューティング 🐧</h1>
<p>クリックで発射 / マウス・指で上下移動</p>
<button onclick="startGame()">スタート</button><br>
<canvas id="game" width="400" height="300"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let player, bullets, enemies, frame, score, gameOver;

function reset() {
  player = { x: 50, y: 150 };
  bullets = [];
  enemies = [];
  frame = 0;
  score = 0;
  gameOver = false;
}

function startGame() {
  reset();
  update();
}

function shoot() {
  if (gameOver) return;
  bullets.push({ x: player.x + 20, y: player.y });
}

// マウス移動
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  player.y = e.clientY - rect.top;
});

// スマホ対応
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  player.y = e.touches[0].clientY - rect.top;
});

function update() {
  if (gameOver) return;

  frame++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // プレイヤー
  ctx.font = '30px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐧', player.x, player.y);

  // 弾
  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i];
    b.x += 6;

    ctx.fillStyle = 'yellow';
    ctx.fillRect(b.x, b.y - 2, 10, 4);

    if (b.x > canvas.width) bullets.splice(i, 1);
  }

  // 敵生成
  if (frame % 60 === 0) {
    enemies.push({
      x: canvas.width,
      y: Math.random() * 260 + 20,
      speed: 2 + Math.random() * 2
    });
  }

  // 敵処理
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    e.x -= e.speed;

    ctx.fillText('👾', e.x, e.y);

    // プレイヤー衝突
    if (Math.abs(e.x - player.x) < 20 && Math.abs(e.y - player.y) < 20) {
      gameOver = true;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.font = '24px Arial';
      ctx.fillText('ゲームオーバー', 200, 130);
      ctx.fillText('Score: ' + score, 200, 170);
      return;
    }

    // 弾と当たり
    for (let j = bullets.length - 1; j >= 0; j--) {
      let b = bullets[j];
      if (Math.abs(b.x - e.x) < 15 && Math.abs(b.y - e.y) < 15) {
        enemies.splice(i, 1);
        bullets.splice(j, 1);
        score++;
        break;
      }
    }

    if (e.x < -30) enemies.splice(i, 1);
  }

  // スコア
  ctx.fillStyle = 'white';
  ctx.font = '16px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + score, 10, 20);

  requestAnimationFrame(update);
}

window.addEventListener('click', shoot);
</script>
</body>
</html>
